name: ranke_mobile
description: "Ranke - Collaborative Ranking App"
publish_to: "none"

version: 1.0.0+1

environment:
    sdk: ^3.11.0

dependencies:
    flutter:
        sdk: flutter

    # UI & Icons
    cupertino_icons: ^1.0.9
    google_fonts: ^8.0.2
    animations: ^2.1.2
    shimmer: ^3.0.0
    cached_network_image: ^3.4.0

    # State Management (Riverpod)
    flutter_riverpod: ^2.6.1
    riverpod_annotation: ^2.6.1

    # DI / Service Locator
    get_it: ^9.2.1

    # Routing & Navigation
    go_router: ^17.2.1

    # Local Storage
    shared_preferences: ^2.3.0
    flutter_secure_storage: ^10.0.0

    # Networking & API
    dio: ^5.4.0
    pretty_dio_logger: ^1.3.1

    # Device & Connectivity
    device_info_plus: ^12.4.0
    connectivity_plus: ^7.1.1

    # Data Classes & Serialization
    freezed_annotation: ^2.4.4
    json_annotation: ^4.9.0

    # Functional Programming
    fpdart: ^1.1.0

    # Auth
    sign_in_with_apple: ^7.0.0

    # Sharing
    share_plus: ^12.0.2

    # Concurrency
    mutex: ^3.1.0

    # Utilities
    intl: ^0.20.2
    uuid: ^4.1.0
    logger: ^2.1.0

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0

    # Code Generation
    build_runner: ^2.5.4
    freezed: ^2.5.8
    json_serializable: ^6.9.5
    riverpod_generator: ^2.6.4

flutter:
    uses-material-design: true
